name: Sync Project Assets

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug - List Files
        run: |
          echo "Current Directory:"
          pwd
          echo "File List:"
          ls -R

      - name: Run Sync Script
        run: |
          # Use 'bash -e' to exit immediately on any error inside the script
          # Use the explicit filename. Ensure it's in your root folder!
          bash -e sync-assets.sh

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          
          # Add the specific folder and file
          git add src/data/projects-data.json public/projects/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'chore: sync project data and images [skip ci]'
            git push
          fi