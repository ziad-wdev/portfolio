name: Sync Project Assets

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug - List Files
        run: |
          echo "Current Directory:"
          pwd
          echo "File List:"
          ls -R

      - name: Run Sync Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x sync-assets.sh
          bash -e sync-assets.sh

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add src/data/projects-data.json public/projects/

          # Use a more descriptive commit message
          if git diff --staged --quiet; then
            echo "No changes detected in project data or assets."
          else
            git commit -m "chore: auto-sync assets $(date +'%Y-%m-%d') [skip ci]"
            git push
          fi
